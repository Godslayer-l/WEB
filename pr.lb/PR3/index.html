<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CSS Стилізація</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 15px;
        }
        h2 {
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="color: darkblue; text-transform: uppercase;">Моя сторінка CSS</h1>
        
        <h2>Заголовок другого рівня</h2>
        
        <p>Це перший параграф тексту на цій сторінці.</p>
        
        <p>А це вже другий параграф тексту:).</p>
        
        <ul>
            <li>Перший елемент</li>
            <li>Другий елемент</li>
            <li>Третій елемент</li>
        </ul>
        
        <p>
            <a href="https://www.google.com">Посилання</a>
        </p>
        
        <div class="box">
            <p>Цей текст лежить всередині блоку divヽ(°□° )ノ.</p>
        </div>

        <img src="f(3p).jpg" alt="Зображення">
    </div>

</body>
</html>
